apiVersion: apps/v1
kind: Deployment
metadata:
  name: callmyagent-server
  labels:
    app: callmyagent
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: callmyagent
      component: server
  template:
    metadata:
      labels:
        app: callmyagent
        component: server
    spec:
      serviceAccountName: callmyagent-sa
      containers:
        - name: server
          image: ghcr.io/zhengjr9/callmyagent/server:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: remote
          env:
            - name: PORT
              value: "8080"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: callmyagent-api-secret
                  key: api-key
            - name: ANTHROPIC_BASE_URL
              value: "https://api.minimaxi.com/anthropic"
            - name: CODEX_BASE_URL
              value: "https://one-openapi.cloud/v1"
            - name: CODEX_MODEL
              value: "deepseek-v4-flash"
            - name: CODEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: callmyagent-api-secret
                  key: codex-api-key
            - name: CONTAINER_IMAGE
              value: "ghcr.io/zhengjr9/callmyagent/worker:latest"
            - name: META_AGENT_MODE
              value: "auto"
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: callmyagent-server
  labels:
    app: callmyagent
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: remote
  selector:
    app: callmyagent
    component: server
