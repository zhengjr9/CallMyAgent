apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-task-sa
  labels:
    app: claude-task
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-task-role
  labels:
    app: claude-task
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-task-rolebinding
  labels:
    app: claude-task
subjects:
  - kind: ServiceAccount
    name: claude-task-sa
    namespace: default
roleRef:
  kind: Role
  name: claude-task-role
  apiGroup: rbac.authorization.k8s.io
