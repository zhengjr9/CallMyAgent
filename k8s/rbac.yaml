apiVersion: v1
kind: ServiceAccount
metadata:
  name: callmyagent-sa
  labels:
    app: callmyagent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: callmyagent-role
  labels:
    app: callmyagent
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: callmyagent-rolebinding
  labels:
    app: callmyagent
subjects:
  - kind: ServiceAccount
    name: callmyagent-sa
    namespace: default
roleRef:
  kind: Role
  name: callmyagent-role
  apiGroup: rbac.authorization.k8s.io
