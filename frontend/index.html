<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallMyAgent - Unified AI Dev Platform</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --background: #f6f8fb;
      --foreground: #1f2329;
      --surface: #ffffff;
      --surface2: #f4f6f8;
      --surface3: #e9edf2;
      --border: #e5e8ef;
      --border-light: #eef1f5;
      --text: #1f2329;
      --muted: #6b7280;
      --primary: #1677ff;
      --primary-dim: #0958d9;
      --secondary: #4b5563;
      --accent: #7c3aed;
      --success: #16a34a;
      --success-dim: #15803d;
      --destructive: #dc2626;
      --warning: #d97706;
      --info: #0284c7;
      --pink: #db2777;
      --radius: 8px;
      --radius-sm: 4px;
      --radius-lg: 12px;
      --shadow: 0 8px 24px rgba(31, 35, 41, 0.08);
    }

    /* Legacy aliases */
    :root {
      --bg: var(--background);
      --blue: var(--primary);
      --blue-dim: var(--primary-dim);
      --green: var(--success);
      --green-dim: var(--success-dim);
      --red: var(--destructive);
      --orange: var(--warning);
      --purple: var(--accent);
      --cyan: var(--info);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--background);
      color: var(--foreground);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      transition: all 0.15s;
    }

    button.primary {
      background: var(--primary);
      color: white;
    }
    button.primary:hover { background: #79b8ff; }

    button.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--surface3); }

    button.danger { background: var(--red); color: white; }
    button.danger:hover { opacity: 0.85; }

    button.success { background: var(--green-dim); color: white; }
    button.success:hover { opacity: 0.85; }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    input, textarea, select {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--blue);
    }

    select { cursor: pointer; }

    .mono { font-family: 'SF Mono', 'Fira Code', monospace; }

    /* Layout */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 248px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .sidebar-nav {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .nav-item {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .nav-item:hover { color: var(--text); }
    .nav-item.active {
      color: var(--text);
      border-bottom-color: var(--blue);
    }

    .sidebar-stats {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--muted);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { color: var(--muted); font-size: 11px; }
    .stat-value { font-weight: 600; font-size: 14px; color: var(--text); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
    }

    .list-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.1s;
    }

    .list-item:hover { background: var(--surface2); }
    .list-item.active {
      background: #eef6ff;
      border-left: 3px solid var(--blue);
    }

    .list-item-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-item-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .badge {
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 500;
    }

    .badge-active { background: #dcfce7; color: var(--green); }
    .badge-resumed { background: #e0f2fe; color: var(--cyan); }
    .badge-ended { background: #f3f4f6; color: var(--muted); }
    .badge-error, .badge-failed { background: #fee2e2; color: var(--red); }
    .badge-ready, .badge-completed { background: #dcfce7; color: var(--green); }
    .badge-running { background: #fef3c7; color: var(--orange); }
    .badge-chatting, .badge-pending { background: #dbeafe; color: var(--blue); }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .main-header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .main-title {
      font-size: 14px;
      font-weight: 500;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 16px;
      flex: 1;
    }

    .main-content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Panels */
    .panel-tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 0;
      flex-shrink: 0;
    }

    .panel-tab {
      padding: 10px 16px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-tab:hover { color: var(--text); }
    .panel-tab.active {
      color: var(--text);
      border-bottom-color: var(--blue);
    }

    .tab-count {
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      min-height: 0;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    .welcome-icon { font-size: 48px; margin-bottom: 8px; }
    .welcome h2 { font-size: 20px; color: var(--text); }
    .welcome p { font-size: 14px; max-width: 400px; }

    /* Chat */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    .message.user {
      background: #eef6ff;
      border-color: #bfdbfe;
    }

    .message.assistant {
      background: var(--surface);
    }

    .message-header {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border-light);
      font-size: 12px;
    }

    .message.user .message-header { background: #dbeafe; }
    .message.assistant .message-header { background: var(--surface2); }

    .message-role {
      font-weight: 600;
      font-size: 12px;
    }

    .message.user .message-role { color: var(--blue); }
    .message.assistant .message-role { color: var(--purple); }

    .message-time { color: var(--muted); margin-left: auto; }
    .message-uuid { color: var(--muted); font-family: monospace; font-size: 11px; }

    .message-body { padding: 12px 14px; }

    /* Content blocks */
    .block { margin-bottom: 10px; }
    .block:last-child { margin-bottom: 0; }

    .block-text {
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .markdown {
      font-size: 14px;
      line-height: 1.75;
      word-break: break-word;
    }

    .markdown p { margin: 0 0 10px; }
    .markdown p:last-child { margin-bottom: 0; }
    .markdown h1, .markdown h2, .markdown h3 {
      margin: 14px 0 8px;
      line-height: 1.35;
      color: var(--text);
    }
    .markdown h1 { font-size: 20px; }
    .markdown h2 { font-size: 17px; }
    .markdown h3 { font-size: 15px; }
    .markdown ul, .markdown ol { margin: 8px 0 12px 22px; padding: 0; }
    .markdown li { margin: 4px 0; }
    .markdown code {
      background: var(--surface2);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 12px;
    }
    .markdown pre {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      white-space: pre;
      margin: 10px 0;
    }
    .markdown pre code {
      background: transparent;
      border: 0;
      color: inherit;
      padding: 0;
    }
    .markdown blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 3px solid var(--blue);
      background: var(--surface2);
      color: var(--muted);
    }

    .typing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      color: var(--muted);
    }
    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingPulse 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .15s; }
    .typing-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes typingPulse {
      0%, 80%, 100% { opacity: .35; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    .block-thinking {
      background: var(--surface2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    .block-thinking-label {
      font-size: 11px;
      color: var(--orange);
      font-weight: 600;
      margin-bottom: 4px;
      display: block;
    }

    .block-tool_use {
      background: #eef6ff;
      border: 1px solid #bfdbfe;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }

    .block-tool-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .block-tool-label::before { content: '→'; color: var(--orange); }

    .tool-name {
      font-weight: 600;
      color: var(--orange);
      font-family: monospace;
      font-size: 13px;
    }

    .tool-id {
      font-family: monospace;
      font-size: 11px;
      color: var(--muted);
      margin-left: 8px;
    }

    .tool-input {
      margin-top: 8px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-family: monospace;
      font-size: 12px;
      overflow-x: auto;
    }

    .tool-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 3px;
    }

    .tool-input-row:last-child { margin-bottom: 0; }

    .tool-key { color: var(--cyan); min-width: 80px; flex-shrink: 0; }
    .tool-val { color: var(--text); word-break: break-all; }
    .tool-null { color: var(--muted); font-style: italic; }

    .block-tool_result {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 12px;
      color: var(--green);
      font-family: monospace;
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-row textarea {
      flex: 1;
      min-height: 48px;
      max-height: 200px;
      resize: none;
      padding: 10px 14px;
      font-size: 14px;
      border-radius: var(--radius);
      font-family: inherit;
    }

    .input-actions {
      display: flex;
      gap: 8px;
    }

    /* Task form */
    .task-form {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; color: var(--muted); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
    }

    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }
    .checkbox-row input {
      width: 16px;
      height: 16px;
    }
    .form-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 540px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; color: var(--muted); font-size: 20px; padding: 4px 8px; }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* Execute config */
    .execute-config {
      background: var(--surface2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .execute-config-title {
      font-size: 12px;
      color: var(--blue);
      font-weight: 500;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .execute-config-grid {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
    }

    /* Engine selector */
    .engine-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .engine-selector label { font-size: 12px; color: var(--muted); }

    .engine-btn {
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .engine-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

    .engine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .engine-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .engine-card.active {
      border-color: var(--primary);
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .engine-card-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    .engine-card code {
      background: var(--surface2);
      padding: 2px 5px;
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
    }

    /* Sessions list */
    .session-info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .session-info-item { display: flex; flex-direction: column; gap: 2px; }
    .session-info-label { color: var(--muted); }
    .session-info-value { font-weight: 500; }

    /* Empty states */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--muted);
      text-align: center;
      gap: 12px;
    }

    .empty-icon { font-size: 36px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Transcript stat bar */
    .transcript-stat {
      display: flex;
      gap: 20px;
      padding: 8px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .transcript-stat span { display: flex; gap: 6px; }

    /* Final prompt indicator */
    .final-prompt-banner {
      background: linear-gradient(135deg, #1a3d2e, #0d2118);
      border: 1px solid var(--green-dim);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .final-prompt-banner-icon { font-size: 20px; }
    .final-prompt-banner-text { font-size: 13px; }
    .final-prompt-banner-text strong { color: var(--green); }

    /* Tooltip */
    [title] { cursor: help; }
  </style>
</head>
<body>
<div id="app">

  <!-- New Task Modal -->
  <div class="modal-overlay" v-if="showNewTask" @click.self="showNewTask = false">
    <div class="modal">
      <div class="modal-header">
        <h2>新建开发任务</h2>
        <button class="modal-close" @click="showNewTask = false">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>任务标题</label>
          <input v-model="newTask.title" placeholder="例如：添加用户登录功能" @keyup.enter="createTask">
        </div>
        <div class="form-group">
          <label>任务描述</label>
          <textarea v-model="newTask.description" placeholder="详细描述需要完成的工作..." rows="4"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Git 仓库</label>
            <input v-model="newTask.gitRepo" placeholder="https://github.com/user/repo.git">
          </div>
          <div class="form-group">
            <label>分支</label>
            <input v-model="newTask.gitBranch" placeholder="main">
          </div>
        </div>
        <div class="form-group">
          <label>执行引擎</label>
          <select v-model="newTask.engine">
            <option v-for="engine in engines" :key="engine.id" :value="engine.id">{{ engine.name }}</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="secondary" @click="showNewTask = false">取消</button>
        <button class="primary" @click="createTask" :disabled="!newTask.title">创建任务</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo-dot"></span> CallMyAgent</h1>
    </div>

    <div class="sidebar-nav">
      <div class="nav-item" :class="{active: view === 'tasks'}" @click="view = 'tasks'">Tasks</div>
      <div class="nav-item" :class="{active: view === 'sessions'}" @click="view = 'sessions'">Sessions</div>
    </div>

    <div class="sidebar-stats" v-if="stats">
      <div class="stat-item">
        <span class="stat-label">Sessions</span>
        <span class="stat-value">{{ stats.total_sessions || 0 }}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Active</span>
        <span class="stat-value">{{ stats.active_sessions || 0 }}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Tools</span>
        <span class="stat-value">{{ stats.total_tools || 0 }}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Transcripts</span>
        <span class="stat-value">{{ stats.total_transcripts || 0 }}</span>
      </div>
    </div>

    <div class="sidebar-list">
      <!-- Tasks View -->
      <template v-if="view === 'tasks'">
        <div class="list-item" v-for="t in tasks" :key="t.id"
             :class="{active: currentTask && currentTask.id === t.id}"
             @click="selectTask(t)">
          <div class="list-item-title">{{ t.title }}</div>
          <div class="list-item-meta">
            <span class="badge" :class="'badge-' + t.status">{{ statusText(t.status) }}</span>
            <span>{{ formatTime(t.createdAt) }}</span>
          </div>
        </div>
        <div class="empty" v-if="tasks.length === 0">
          <div class="empty-icon">📋</div>
          No tasks yet
        </div>
      </template>

      <!-- Sessions View -->
      <template v-else-if="view === 'sessions'">
        <div class="list-item" v-for="s in sessions" :key="s.session_id"
             :class="{active: currentSession && currentSession.session_id === s.session_id}"
             @click="selectSession(s)">
          <div class="list-item-title mono" style="font-size:12px">{{ s.session_id.slice(0,20) }}...</div>
          <div class="list-item-meta">
            <span class="badge" :class="'badge-' + s.status">{{ s.status }}</span>
            <span>{{ s.model || 'unknown' }}</span>
            <span>{{ s.cwd ? s.cwd.split('/').pop() : '' }}</span>
          </div>
        </div>
        <div class="empty" v-if="sessions.length === 0">
          <div class="empty-icon">💬</div>
          No sessions captured
        </div>
      </template>
    </div>

    <div style="padding: 12px; border-top: 1px solid var(--border)">
      <button class="primary" style="width: 100%" @click="showNewTask = true">+ 新建任务</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Task View -->
    <template v-if="view === 'tasks' && currentTask">
      <div class="main-header">
        <div class="main-title">{{ currentTask.title }}</div>
        <div class="main-meta">
          <span class="badge" :class="'badge-' + currentTask.status">{{ statusText(currentTask.status) }}</span>
          <span v-if="currentTask.gitRepo">{{ currentTask.gitRepo.split('/').pop() }}</span>
          <span>{{ currentTask.engine || 'claude' }}</span>
        </div>
        <div class="engine-selector">
          <label>Engine:</label>
          <button class="engine-btn" v-for="engine in engines" :key="engine.id"
                  :class="{active: currentTask.engine === engine.id}"
                  @click="currentTask.engine = engine.id; executeConfig.engine = engine.id">
            {{ shortEngineName(engine.name) }}
          </button>
        </div>
      </div>

      <!-- Final prompt banner -->
      <div class="final-prompt-banner" v-if="currentTask.finalPrompt && currentTask.status !== 'ready'">
        <span class="final-prompt-banner-icon">✅</span>
        <span class="final-prompt-banner-text">
          <strong>Final prompt 已生成</strong> — {{ currentTask.finalPrompt.length }} 字符
        </span>
      </div>

      <div class="panel-tabs">
        <div class="panel-tab" :class="{active: taskTab === 'chat'}" @click="taskTab = 'chat'">
          对话 <span class="tab-count">{{ currentTask.conversation ? currentTask.conversation.length / 2 : 0 }}</span>
        </div>
        <div class="panel-tab" :class="{active: taskTab === 'prompt'}" @click="taskTab = 'prompt'" v-if="currentTask.finalPrompt">
          Final Prompt
        </div>
        <div class="panel-tab" :class="{active: taskTab === 'execute'}" @click="taskTab = 'execute'">
          执行配置
        </div>
        <div class="panel-tab" :class="{active: taskTab === 'engines'}" @click="taskTab = 'engines'">
          引擎导入 <span class="tab-count">{{ engines.length }}</span>
        </div>
      </div>

      <div class="main-content">
        <!-- Chat tab -->
        <template v-if="taskTab === 'chat'">
          <div class="chat-messages" ref="chatMessages">
            <div class="message" v-for="(msg, i) in currentTask.conversation" :key="i"
                 :class="msg.role">
              <div class="message-header">
                <span class="message-role">{{ msg.role === 'user' ? 'User' : 'CallMyAgent' }}</span>
              </div>
              <div class="message-body">
                <div class="markdown" v-html="renderMarkdown(msg.content)"></div>
              </div>
            </div>
            <div class="message assistant" v-if="loading">
              <div class="message-header">
                <span class="message-role">CallMyAgent</span>
              </div>
              <div class="message-body">
                <div class="typing-dots" v-if="!streamingText"><span></span><span></span><span></span> 正在生成</div>
                <div class="markdown" v-else v-html="renderMarkdown(streamingText)"></div>
              </div>
            </div>
          </div>

          <!-- Execute config in chat tab -->
          <div class="execute-config" v-if="currentTask.status === 'ready' || currentTask.status === 'chatting'">
            <div class="execute-config-title">⚙️ 执行配置</div>
            <div class="execute-config-grid">
              <input v-model="executeConfig.gitRepo" placeholder="Git 仓库 URL">
              <input v-model="executeConfig.gitBranch" placeholder="分支 (默认 main)">
              <select v-model="executeConfig.schedulerMode">
                <option value="docker">Docker 本地</option>
                <option value="job">Kubernetes Job</option>
              </select>
            </div>
          </div>
        </template>

        <!-- Prompt tab -->
        <template v-else-if="taskTab === 'prompt'">
          <div class="panel-content">
            <div class="markdown" v-html="renderMarkdown(currentTask.finalPrompt)"></div>
          </div>
        </template>

        <!-- Execute tab -->
        <template v-else-if="taskTab === 'execute'">
          <div class="panel-content">
            <div class="form-group">
              <label>Git 仓库</label>
              <input v-model="executeConfig.gitRepo" :placeholder="currentTask.gitRepo || 'https://github.com/user/repo.git'">
            </div>
            <div class="form-group">
              <label>分支</label>
              <input v-model="executeConfig.gitBranch" placeholder="main">
            </div>
            <div class="form-group">
              <label>Git Token / .netrc</label>
              <input v-model="executeConfig.gitToken" type="password" autocomplete="off" placeholder="GitHub/GitLab token，执行时写入容器 ~/.netrc">
              <label class="checkbox-row">
                <input type="checkbox" v-model="executeConfig.useHostNetrc" :disabled="!!executeConfig.gitToken">
                使用服务端 ~/.netrc
              </label>
              <div class="form-hint">优先使用上方 token；留空并勾选时会挂载运行服务用户的 ~/.netrc。</div>
            </div>
            <div class="form-group">
              <label>引擎</label>
              <select v-model="executeConfig.engine">
                <option v-for="engine in engines" :key="engine.id" :value="engine.id">{{ engine.name }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>调度模式</label>
              <select v-model="executeConfig.schedulerMode">
                <option value="docker">Docker 本地</option>
                <option value="job">Kubernetes Job</option>
              </select>
            </div>
            <div class="form-group">
              <label>最大轮数 (MAX_TURNS)</label>
              <input v-model.number="executeConfig.maxTurns" type="number" min="1" max="200" placeholder="20">
            </div>
            <div class="form-group">
              <label>预算 (USD)</label>
              <input v-model.number="executeConfig.budgetUsd" type="number" min="0.01" step="0.1" placeholder="5.00">
            </div>
            <div style="margin-top: 20px">
              <button class="success" @click="executeTask" :disabled="executing || (!executeConfig.gitRepo && executeConfig.schedulerMode !== 'docker')">
                {{ executing ? '提交中...' : '执行任务' }}
              </button>
            </div>
          </div>
        </template>

        <!-- Engines tab -->
        <template v-else-if="taskTab === 'engines'">
          <div class="panel-content">
            <div class="engine-grid">
              <div class="engine-card" v-for="engine in engines" :key="engine.id"
                   :class="{active: executeConfig.engine === engine.id}">
                <div class="engine-card-title">
                  <span>{{ engine.name }}</span>
                  <button class="engine-btn" @click="executeConfig.engine = engine.id; currentTask.engine = engine.id">选择</button>
                </div>
                <div class="mono" style="font-size:12px;color:var(--muted)">{{ engine.nonInteractive }}</div>
                <div style="font-size:12px;color:var(--muted)">
                  <div v-for="line in engine.install" :key="line"><code>{{ line }}</code></div>
                </div>
                <a :href="engine.docsUrl" target="_blank" style="font-size:12px">安装与配置说明</a>
              </div>
            </div>
          </div>
        </template>

        <div class="input-area">
          <div class="input-row">
            <textarea v-model="inputMessage" placeholder="输入消息..."
                      @keyup.enter.exact="sendMessage" :disabled="loading || currentTask.status === 'running'"></textarea>
            <div class="input-actions">
              <button class="secondary" @click="showNewTask = true">+</button>
              <button class="primary" @click="sendMessage" :disabled="loading || !inputMessage.trim() || currentTask.status === 'running'">
                发送
              </button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Session View -->
    <template v-else-if="view === 'sessions' && currentSession">
      <div class="main-header">
        <div class="main-title mono">{{ currentSession.session_id.slice(0,32) }}...</div>
        <div class="main-meta">
          <span class="badge" :class="'badge-' + currentSession.status">{{ currentSession.status }}</span>
          <span>{{ currentSession.model || 'unknown' }}</span>
          <span>{{ currentSession.cwd }}</span>
        </div>
      </div>

      <div class="session-info-grid">
        <div class="session-info-item">
          <span class="session-info-label">Engine</span>
          <span class="session-info-value">{{ currentSession.model || '-' }}</span>
        </div>
        <div class="session-info-item">
          <span class="session-info-label">Cwd</span>
          <span class="session-info-value">{{ currentSession.cwd ? currentSession.cwd.split('/').pop() : '-' }}</span>
        </div>
        <div class="session-info-item">
          <span class="session-info-label">Started</span>
          <span class="session-info-value">{{ formatTime(currentSession.started_at) }}</span>
        </div>
        <div class="session-info-item">
          <span class="session-info-label">Status</span>
          <span class="session-info-value">{{ currentSession.status }}</span>
        </div>
      </div>

      <div class="panel-tabs">
        <div class="panel-tab" :class="{active: sessionTab === 'messages'}" @click="sessionTab = 'messages'">
          Messages <span class="tab-count">{{ transcriptMessages.length }}</span>
        </div>
        <div class="panel-tab" :class="{active: sessionTab === 'events'}" @click="sessionTab = 'events'">
          Events <span class="tab-count">{{ events.length }}</span>
        </div>
        <div class="panel-tab" :class="{active: sessionTab === 'tools'}" @click="sessionTab = 'tools'">
          Tools <span class="tab-count">{{ tools.length }}</span>
        </div>
      </div>

      <div class="transcript-stat" v-if="sessionTab === 'messages'">
        <span><span style="color:var(--muted)">User:</span> <strong>{{ transcriptUserCount }}</strong></span>
        <span><span style="color:var(--muted)">Assistant:</span> <strong>{{ transcriptAssistantCount }}</strong></span>
        <span><span style="color:var(--muted)">Tool calls:</span> <strong>{{ transcriptToolCount }}</strong></span>
      </div>

      <div class="main-content">
        <!-- Messages tab -->
        <template v-if="sessionTab === 'messages'">
          <div class="panel-content">
            <div class="message" v-for="(msg, i) in transcriptMessages" :key="i"
                 :class="msg.role === 'user' ? 'user' : 'assistant'">
              <div class="message-header">
                <span class="message-role">{{ msg.role === 'user' ? 'User' : 'Claude' }}</span>
                <span class="message-uuid" v-if="msg.uuid">{{ msg.uuid.slice(0, 8) }}</span>
                <span class="message-time">{{ formatTimeShort(msg.timestamp) }}</span>
              </div>
              <div class="message-body">
                <template v-if="Array.isArray(msg.content)">
                  <div v-for="(block, bi) in msg.content" :key="bi" class="block" :class="'block-' + block.type">
                    <div v-if="block.type === 'text'" class="block-text">{{ block.text }}</div>
                    <div v-else-if="block.type === 'thinking'" class="block-thinking">
                      <span class="block-thinking-label">💭 Thinking</span>
                      {{ block.thinking }}
                    </div>
                    <div v-else-if="block.type === 'tool_use'" class="block-tool_use">
                      <div class="block-tool-label">
                        <span class="tool-name">{{ block.name }}</span>
                        <span class="tool-id" v-if="block.id">{{ block.id.slice(0,16) }}...</span>
                      </div>
                      <div class="tool-input" v-if="block.input && Object.keys(block.input).length">
                        <div v-for="(val, key) in block.input" :key="key" class="tool-input-row">
                          <span class="tool-key">{{ key }}:</span>
                          <span class="tool-val" v-if="val !== null && val !== undefined">
                            {{ typeof val === 'object' ? JSON.stringify(val).slice(0, 300) : val }}
                          </span>
                          <span class="tool-null" v-else>null</span>
                        </div>
                      </div>
                    </div>
                    <div v-else-if="block.type === 'tool_result'" class="block-tool_result">
                      [Result] {{ typeof block.content === 'string' ? block.content.slice(0, 200) : JSON.stringify(block.content).slice(0, 200) }}
                    </div>
                  </div>
                </template>
                <template v-else-if="typeof msg.content === 'string'">
                  <div class="block-text">{{ msg.content }}</div>
                </template>
                <template v-else-if="msg.thinking">
                  <div class="block-thinking">
                    <span class="block-thinking-label">💭 Thinking</span>
                    {{ msg.thinking }}
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>

        <!-- Events tab -->
        <template v-else-if="sessionTab === 'events'">
          <div class="panel-content">
            <div class="message" v-for="(e, i) in events" :key="i" style="border-radius: 6px; margin-bottom: 8px;">
              <div class="message-body" style="padding: 8px 12px;">
                <span style="color: var(--green); font-family: monospace; font-size: 12px; min-width: 120px; display: inline-block;">{{ e.event }}</span>
                <span style="color: var(--muted); font-size: 12px; margin-left: 12px;">{{ e.raw && e.raw.tool_name ? e.raw.tool_name : e.cwd }}</span>
              </div>
            </div>
          </div>
        </template>

        <!-- Tools tab -->
        <template v-else-if="sessionTab === 'tools'">
          <div class="panel-content">
            <div class="message" v-for="(t, i) in tools" :key="i" style="border-radius: 6px; margin-bottom: 8px;">
              <div class="message-body">
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                  <span class="tool-name">{{ t.tool_name }}</span>
                  <span class="badge" :class="t.event === 'PreToolUse' ? 'badge-active' : 'badge-ended'" style="font-size: 10px;">{{ t.event }}</span>
                  <span v-if="t.is_pre_tool" style="color: var(--blue); font-size: 11px;">pre</span>
                </div>
                <div class="tool-input" v-if="t.tool_input && Object.keys(t.tool_input).length" style="margin: 0;">
                  <div v-for="(val, key) in t.tool_input" :key="key" class="tool-input-row">
                    <span class="tool-key">{{ key }}:</span>
                    <span class="tool-val">
                      <template v-if="val !== null && val !== undefined">
                        {{ typeof val === 'string' ? val : JSON.stringify(val) }}
                      </template>
                      <span class="tool-null" v-else>null</span>
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Empty state -->
    <template v-else>
      <div class="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>CallMyAgent</h2>
        <p>通过 AI 对话规划开发任务，自动执行代码编写。支持 Claude、Codex、OpenCode、Hermes、OpenClaw。</p>
        <button class="primary" @click="showNewTask = true">新建任务</button>
      </div>
    </template>
  </div>
</div>

<script>
const { createApp, ref, computed, onMounted, nextTick, watch } = Vue;

createApp({
  setup() {
    const API = window.location.origin;
    const view = ref('tasks');
    const tasks = ref([]);
    const sessions = ref([]);
    const engines = ref([
      { id: 'claude', name: 'Claude Code' },
      { id: 'codex', name: 'Codex CLI' },
      { id: 'opencode', name: 'OpenCode' },
      { id: 'hermes', name: 'Hermes Agent' },
      { id: 'openclaw', name: 'OpenClaw' }
    ]);
    const currentTask = ref(null);
    const currentSession = ref(null);
    const chatMessages = ref(null);
    const inputMessage = ref('');
    const loading = ref(false);
    const executing = ref(false);
    const streamingText = ref('');
    const showNewTask = ref(false);
    const taskTab = ref('chat');
    const sessionTab = ref('messages');
    const stats = ref(null);

    // Data for current session
    const transcript = ref(null);
    const events = ref([]);
    const tools = ref([]);
    const messages = ref([]);

    const newTask = ref({ title: '', description: '', gitRepo: '', gitBranch: 'main', engine: 'claude' });
    const executeConfig = ref({
      gitRepo: '',
      gitBranch: 'main',
      gitToken: '',
      useHostNetrc: false,
      engine: 'claude',
      schedulerMode: 'docker',
      maxTurns: 20,
      budgetUsd: 5.0
    });

    // Computed
    const transcriptMessages = computed(() => {
      if (transcript.value?.messages) return transcript.value.messages;
      return messages.value.map(m => ({
        role: m.role,
        content: m.content,
        timestamp: m.timestamp,
        uuid: m.uuid
      }));
    });

    const transcriptMessageCount = computed(() => transcriptMessages.value.length);
    const transcriptUserCount = computed(() => transcriptMessages.value.filter(m => m.role === 'user').length);
    const transcriptAssistantCount = computed(() => transcriptMessages.value.filter(m => m.role === 'assistant').length);
    const transcriptToolCount = computed(() => {
      let count = 0;
      for (const msg of transcriptMessages.value) {
        if (Array.isArray(msg.content)) {
          count += msg.content.filter(b => b.type === 'tool_use').length;
        }
      }
      return count;
    });

    // Utils
    const statusText = (s) => ({
      chatting: '对话中', ready: '待执行', running: '运行中',
      completed: '已完成', failed: '失败', pending: '等待中'
    }[s] || s);

    const shortEngineName = (name) => (name || '').replace(' Code', '').replace(' CLI', '').replace(' Agent', '');

    const formatTime = (t) => {
      if (!t) return '';
      try { return new Date(t).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
      catch { return t; }
    };

    const formatTimeShort = (t) => {
      if (!t) return '';
      try { return new Date(t).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
      catch { return t; }
    };

    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const renderInlineMarkdown = (value) => escapeHtml(value)
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>');

    const renderMarkdown = (value) => {
      const text = String(value ?? '');
      const parts = text.split(/(```[\s\S]*?```)/g);
      return parts.map(part => {
        if (part.startsWith('```')) {
          const code = part.replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
          return `<pre><code>${escapeHtml(code)}</code></pre>`;
        }
        const lines = part.split(/\r?\n/);
        const html = [];
        let list = null;
        let paragraph = [];
        const flushParagraph = () => {
          if (!paragraph.length) return;
          html.push(`<p>${renderInlineMarkdown(paragraph.join(' '))}</p>`);
          paragraph = [];
        };
        const closeList = () => {
          if (!list) return;
          html.push(`</${list}>`);
          list = null;
        };
        for (const line of lines) {
          if (!line.trim()) {
            flushParagraph();
            closeList();
            continue;
          }
          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            closeList();
            const level = heading[1].length;
            html.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
            continue;
          }
          const bullet = line.match(/^\s*[-*]\s+(.+)$/);
          const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
          if (bullet || ordered) {
            flushParagraph();
            const tag = bullet ? 'ul' : 'ol';
            if (list !== tag) {
              closeList();
              html.push(`<${tag}>`);
              list = tag;
            }
            html.push(`<li>${renderInlineMarkdown((bullet || ordered)[1])}</li>`);
            continue;
          }
          const quote = line.match(/^>\s?(.+)$/);
          if (quote) {
            flushParagraph();
            closeList();
            html.push(`<blockquote>${renderInlineMarkdown(quote[1])}</blockquote>`);
            continue;
          }
          closeList();
          paragraph.push(line.trim());
        }
        flushParagraph();
        closeList();
        return html.join('');
      }).join('');
    };

    const scrollChatToBottom = () => {
      requestAnimationFrame(() => {
        if (chatMessages.value) chatMessages.value.scrollTop = chatMessages.value.scrollHeight;
      });
    };

    // Load data
    const loadTasks = async () => {
      try {
        const res = await fetch(API + '/api/tasks');
        tasks.value = (await res.json()) || [];
      } catch (e) { console.error('load tasks:', e); }
    };

    const loadEngines = async () => {
      try {
        const res = await fetch(API + '/api/engines');
        const data = await res.json();
        if (Array.isArray(data) && data.length) engines.value = data;
      } catch (e) { console.error('load engines:', e); }
    };

    const loadSessions = async () => {
      try {
        const res = await fetch(API + '/api/sessions');
        sessions.value = (await res.json()) || [];
        sessions.value.sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''));
      } catch (e) { console.error('load sessions:', e); }
    };

    const loadStats = async () => {
      try {
        const res = await fetch(API + '/api/sessions?fields');
        stats.value = (await res.json()) || {};
      } catch (e) {}
    };

    const selectTask = async (t) => {
      currentTask.value = { ...t };
      taskTab.value = 'chat';
      executeConfig.value = {
        gitRepo: t.gitRepo || '',
        gitBranch: t.gitBranch || 'main',
        gitToken: '',
        useHostNetrc: false,
        engine: t.engine || 'claude',
        schedulerMode: t.schedulerMode || 'docker',
        maxTurns: t.maxTurns || 20,
        budgetUsd: t.budgetUsd || 5.0
      };
    };

    const selectSession = async (s) => {
      currentSession.value = s;
      sessionTab.value = 'messages';
      transcript.value = null;
      messages.value = [];
      events.value = [];
      tools.value = [];
      await loadSessionData(s.session_id);
    };

    const loadSessionData = async (sid) => {
      try {
        const [transRes, evtRes, toolRes, msgRes] = await Promise.all([
          fetch(API + '/api/sessions/' + sid + '/transcript'),
          fetch(API + '/api/sessions/' + sid + '/events'),
          fetch(API + '/api/sessions/' + sid + '/tools'),
          fetch(API + '/api/sessions/' + sid + '/messages')
        ]);

        const t = await transRes.json();
        if (t && !t.error && t.messages) {
          transcript.value = t;
        } else {
          messages.value = (await msgRes.json()) || [];
        }
        events.value = (await evtRes.json()) || [];
        tools.value = (await toolRes.json()) || [];
      } catch (e) { console.error('load session data:', e); }
    };

    const createTask = async () => {
      try {
        const body = { ...newTask.value, gitBranch: newTask.value.gitBranch || 'main' };
        const res = await fetch(API + '/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const task = await res.json();
        tasks.value.unshift(task);
        selectTask(task);
        showNewTask.value = false;
        newTask.value = { title: '', description: '', gitRepo: '', gitBranch: 'main', engine: 'claude' };

        if (task.description) {
          inputMessage.value = task.description;
          await sendMessage();
        }
      } catch (e) { console.error('create task:', e); }
    };

    const sendMessage = async () => {
      if (!inputMessage.value.trim() || loading.value || !currentTask.value) return;
      const msg = inputMessage.value.trim();
      inputMessage.value = '';
      loading.value = true;
      streamingText.value = '';

      if (!currentTask.value.conversation) currentTask.value.conversation = [];
      currentTask.value.conversation.push({ role: 'user', content: msg });
      scrollChatToBottom();

      try {
        const res = await fetch(API + '/api/tasks/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ taskId: currentTask.value.id, message: msg })
        });
        if (!res.ok || !res.body) {
          const text = await res.text();
          throw new Error(text || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalData = null;
        let errorMessage = '';

        const handleEvent = (raw) => {
          const lines = raw.split(/\r?\n/);
          let event = 'message';
          let data = '';
          for (const line of lines) {
            if (line.startsWith('event:')) event = line.slice(6).trim();
            if (line.startsWith('data:')) data += line.slice(5).trim();
          }
          if (!data) return;
          const payload = JSON.parse(data);
          if (event === 'delta') {
            streamingText.value += payload.text || '';
            scrollChatToBottom();
          } else if (event === 'done') {
            finalData = payload;
          } else if (event === 'error') {
            errorMessage = payload.error || '请求失败';
          }
        };

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split('\n\n');
          buffer = events.pop() || '';
          events.forEach(handleEvent);
        }
        if (buffer.trim()) handleEvent(buffer);
        if (errorMessage) throw new Error(errorMessage);

        const reply = finalData?.reply || streamingText.value;
        if (reply) {
          currentTask.value.conversation.push({ role: 'assistant', content: reply });
          streamingText.value = '';
          if (finalData?.isFinal) currentTask.value.status = 'ready';
          const taskRes = await fetch(API + '/api/tasks/' + currentTask.value.id);
          if (taskRes.ok) {
            const updated = await taskRes.json();
            currentTask.value = { ...currentTask.value, ...updated };
          }
          scrollChatToBottom();
        }
      } catch (e) {
        console.error('chat error:', e);
        streamingText.value = '';
        currentTask.value.conversation.push({ role: 'assistant', content: '请求失败: ' + e.message });
      } finally {
        loading.value = false;
        streamingText.value = '';
      }
    };

    const executeTask = async () => {
      if (executing.value) return;
      executing.value = true;
      try {
        const body = {
          taskId: currentTask.value.id,
          gitRepo: executeConfig.value.gitRepo || currentTask.value.gitRepo,
          gitBranch: executeConfig.value.gitBranch || 'main',
          gitToken: executeConfig.value.gitToken || '',
          useHostNetrc: !executeConfig.value.gitToken && !!executeConfig.value.useHostNetrc,
          engine: executeConfig.value.engine || 'claude',
          schedulerMode: executeConfig.value.schedulerMode || 'docker',
          maxTurns: executeConfig.value.maxTurns || 20,
          budgetUsd: executeConfig.value.budgetUsd || 5.0
        };
        const res = await fetch(API + '/api/tasks/execute', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);
        const data = await res.json();
        currentTask.value.status = 'running';
        currentTask.value.jobName = data.jobName;
        currentTask.value.schedulerMode = body.schedulerMode;
      } catch (e) {
        alert('执行失败: ' + e.message);
      } finally {
        executing.value = false;
      }
    };

    // Poll
    const refresh = async () => {
      await loadSessions();
      await loadStats();
      if (currentTask.value?.status === 'running') {
        await loadTasks();
        const t = tasks.value.find(t => t.id === currentTask.value.id);
        if (t) currentTask.value.status = t.status;
      }
      if (currentSession.value) {
        await loadSessionData(currentSession.value.session_id);
      }
    };

    onMounted(() => {
      loadEngines();
      loadTasks();
      loadSessions();
      loadStats();
      setInterval(refresh, 3000);
    });

    return {
      view, tasks, sessions, currentTask, currentSession,
      inputMessage, loading, executing, streamingText, showNewTask, taskTab, sessionTab, stats, engines,
      chatMessages,
      transcript, events, tools, messages,
      transcriptMessages, transcriptMessageCount, transcriptUserCount, transcriptAssistantCount, transcriptToolCount,
      newTask, executeConfig,
      statusText, formatTime, formatTimeShort, shortEngineName, renderMarkdown,
      selectTask, selectSession, createTask, sendMessage, executeTask
    };
  }
}).mount('#app');
</script>
</body>
</html>
