# Codex Configuration
# This is used when TASK_ENGINE=codex

[api]
# API key is passed via CODEX_API_KEY environment variable in the K8s secret

[hooks]
# Hooks are configured at runtime via entrypoint.sh when CLAUDE_REMOTE_URL is set

[sandbox]
# Sandbox settings for codex exec
mode = "workspace-write"

[exec]
# Default exec settings
ephemeral = true
json = true
max_turns = 50

[model]
# Default model (can be overridden via CLI flags)
provider = "anthropic"
model = "claude-sonnet-4-6"